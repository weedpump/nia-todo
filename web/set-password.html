<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title data-i18n-key="setPassword.pageTitle">Set password · nia-todo</title>
<link rel="stylesheet" href="/static/style.css">
<style>
body { margin: 0; min-height: 100vh; background: var(--bg-primary); display:flex; align-items:center; justify-content:center; padding:20px; }
.card { width: 100%; max-width: 420px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 28px; box-shadow: var(--shadow-lg); }
h1 { font-size: 22px; margin: 0 0 8px; color: var(--text-primary); display:inline-flex; align-items:center; gap:8px; }
p { color: var(--text-secondary); margin: 0 0 20px; line-height: 1.5; }
.field { margin-bottom: 14px; }
label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
input { width:100%; box-sizing:border-box; padding:11px 12px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-primary); color:var(--text-primary); font-size:15px; }
input:focus { outline:none; border-color:var(--accent); }
.btn { width:100%; min-height:42px; padding:0 16px; border:none; border-radius:var(--radius); font-size:15px; font-weight:600; line-height:1; cursor:pointer; background:var(--accent); color:white; display:inline-flex; align-items:center; justify-content:center; text-align:center; }
.btn:hover { background:var(--accent-hover); }
.btn:disabled { opacity:.6; cursor:not-allowed; }
.error { color:var(--danger); font-size:13px; min-height:18px; margin:10px 0 14px; }
.success { color:var(--success); font-size:14px; margin-top:12px; }
.success .btn { margin-top:14px; text-decoration:none; }
.resend-box { margin-top: 14px; }
.resend-box input { margin-top: 10px; font-size: 13px; }
.hint { font-size:12px; color:var(--text-muted); margin-top:8px; }
.hidden { display:none; }
.ui-icon { width: 1em; height: 1em; display:inline-block; vertical-align:-0.14em; }
</style>
</head>
<body>
  <main class="card">
    <h1><span data-icon="lock-keyhole"></span> <span data-i18n-key="setPassword.title">Set password</span></h1>
    <p id="intro" data-i18n-key="setPassword.checkingLink">Checking link...</p>

    <form id="password-form" class="hidden">
      <div class="field">
        <label for="password" data-i18n-key="setPassword.newPassword">New password</label>
        <input type="password" id="password" autocomplete="new-password" required>
      </div>
      <div class="field">
        <label for="confirm-password" data-i18n-key="setPassword.confirmPassword">Confirm password</label>
        <input type="password" id="confirm-password" autocomplete="new-password" required>
      </div>
      <div class="hint" data-i18n-key="setPassword.requirements">At least 8 characters, 1 uppercase, 1 lowercase, 1 digit, 1 special character.</div>
      <div class="error" id="error"></div>
      <button class="btn" id="submit-btn" type="submit" data-i18n-key="setPassword.submit">Set password</button>
    </form>

    <div class="error" id="fatal-error"></div>
    <div class="resend-box hidden" id="resend-box">
      <button class="btn" id="resend-btn" type="button" data-i18n-key="setPassword.resend">Request new link</button>
      <input class="hidden" type="text" id="resend-link-input" readonly>
    </div>
    <div class="success" id="success"></div>
  </main>

<script type="module">
import { hydrateIcons } from './static/js/icons/lucide-icons.js';
hydrateIcons(document);
</script>
<script type="module">
import { initI18n, t } from './static/js/i18n/index.js';
import { apiErrorFromResponse } from './static/js/api/errors.js';
await initI18n();

const initialParams = new URLSearchParams(location.search);
const token = initialParams.get('token') || '';
if (token) {
  initialParams.delete('token');
  const cleanUrl = `${location.pathname}${initialParams.toString() ? `?${initialParams}` : ''}${location.hash}`;
  history.replaceState(null, '', cleanUrl);
}
const intro = document.getElementById('intro');
const form = document.getElementById('password-form');
const errorEl = document.getElementById('error');
const fatalError = document.getElementById('fatal-error');
const successEl = document.getElementById('success');
const submitBtn = document.getElementById('submit-btn');
const resendBox = document.getElementById('resend-box');
const resendBtn = document.getElementById('resend-btn');
const resendLinkInput = document.getElementById('resend-link-input');

async function parseOrThrow(response) {
  if (!response.ok) await apiErrorFromResponse(response, t('common.error'));
  return response.json().catch(() => ({}));
}

async function init() {
  if (!token) {
    intro.textContent = t('setPassword.missingTokenIntro');
    fatalError.textContent = t('setPassword.missingTokenHint');
    return;
  }
  try {
    const data = await fetch('/api/password-setup/validate?token=' + encodeURIComponent(token)).then(parseOrThrow);
    if (data.expired) {
      intro.textContent = t('setPassword.expiredIntro', { name: data.display_name || data.username });
      if (data.can_resend) {
        fatalError.textContent = t('setPassword.canResend');
        resendBox.classList.remove('hidden');
      } else {
        fatalError.textContent = t('setPassword.contactAdmin');
      }
      return;
    }
    intro.textContent = t('setPassword.validIntro', { name: data.display_name || data.username });
    form.classList.remove('hidden');
  } catch (e) {
    intro.textContent = t('setPassword.invalidLink');
    fatalError.textContent = e.message;
  }
}

resendBtn.addEventListener('click', async () => {
  fatalError.textContent = '';
  successEl.textContent = '';
  resendLinkInput.classList.add('hidden');
  resendBtn.disabled = true;
  try {
    const data = await fetch('/api/password-setup/resend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    }).then(parseOrThrow);
    if (data.password_setup_delivery === 'email') {
      successEl.textContent = t('setPassword.resendSentEmail');
    } else if (data.password_setup_url) {
      successEl.textContent = t('setPassword.resendCreated');
      resendLinkInput.value = data.password_setup_url;
      resendLinkInput.classList.remove('hidden');
    } else {
      successEl.textContent = data.message || t('setPassword.resendRequested');
    }
  } catch (e) {
    fatalError.textContent = e.message;
    resendBtn.disabled = false;
  }
});

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  errorEl.textContent = '';
  successEl.textContent = '';
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm-password').value;
  if (password !== confirm) {
    errorEl.textContent = t('settings.password.mismatch');
    return;
  }
  submitBtn.disabled = true;
  try {
    await fetch('/api/password-setup/complete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    }).then(parseOrThrow);
    form.classList.add('hidden');
    intro.textContent = t('setPassword.completedIntro');
    successEl.innerHTML = `${t('setPassword.completedMessage')}<br><a class="btn" href="/">${t('setPassword.toApp')}</a>`;
  } catch (e) {
    errorEl.textContent = e.message;
    submitBtn.disabled = false;
  }
});

init();
</script>
</body>
</html>
